<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYCLES — Contact</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap');

        :root {
            --brand-red:  #d43800;
            --brand-blue: #1e48d4;

            --bg:         #fbf7df;
            --bg-label:   #fffdf9;
            --bg-inset:   #f5f2e6;
            --bg-raised:  #eae3cc;
            --bg-panel:   #e4dcbe;
            --bg-hover:   #ddd4b6;

            --fg:         #1c1710;
            --fg-dim:     #3a2e18;
            --fg-muted:   #6a5c38;

            --border:       #a09060;
            --border-dark:  #706040;

            --logo-dark: #18191e;

            --shadow-stack: var(--border);
        }

        body.dark {
            --bg:        #22201b;
            --bg-label:  #000000;
            --bg-inset:  #131211;
            --bg-raised: #45423a;
            --bg-panel:  #302d27;
            --bg-hover:  #3a3731;

            --fg:        #e6e6e6;
            --fg-dim:    #e9e2e2;
            --fg-muted:  #f4ecec;

            --border:      #6e6c68;
            --border-dark: #747272;

            --logo-dark: #f1e7d2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 12px;
            background-color: var(--bg);
            color: var(--fg);
        }

        #app {
            max-width: 850px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        /* ── Header ── */
        #header {
            display: flex;
            align-items: stretch;
            justify-content: space-between;
            padding-bottom: 14px;
            margin-bottom: 18px;
            border-bottom: 1px solid var(--border);
        }
        #logo { display: flex; flex-direction: column; gap: 22px; }
        #logo svg .st1 { fill: var(--brand-blue); }
        #logo svg .st0 { fill: var(--brand-red); }
        #logo-sub {
            font-size: 9px;
            letter-spacing: 0.14em;
            color: var(--fg-muted);
            text-transform: uppercase;
        }
        #header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-end;
            gap: 8px;
        }

        /* ── Theme toggle ── */
        #theme-controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .theme-toggle {
            position: relative;
            display: inline-block;
            cursor: pointer;
            user-select: none;
        }
        .theme-toggle input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            pointer-events: none;
        }
        .theme-toggle-track {
            display: inline-block;
            position: relative;
            width: 40px;
            height: 18px;
            background: var(--bg-inset);
            border: 1px solid var(--border);
            box-shadow: inset 1px 1px 1px rgba(0, 0, 0, 0.08);
            opacity: 0.75;
            transition: opacity 0.14s ease;
        }
        .theme-toggle:hover .theme-toggle-track { opacity: 1; }
        .theme-toggle-label {
            position: absolute;
            width: 1px; height: 1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
            clip-path: inset(50%);
            white-space: nowrap;
        }
        .theme-toggle-icon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            color: var(--fg);
            pointer-events: none;
            display: inline-flex;
        }
        .theme-toggle-icon svg { width: 100%; height: 100%; display: block; }
        .theme-toggle-icon.sun  { left: 4px; }
        .theme-toggle-icon.moon { right: 4px; }
        .theme-toggle-thumb {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 12px;
            background: var(--bg-raised);
            border: 1px solid var(--border);
            box-shadow: 1px 1px 0 var(--border);
            transition: left 0.16s cubic-bezier(.4, 1.1, .5, 1), background 0.15s, box-shadow 0.15s;
        }
        .theme-toggle input:checked ~ .theme-toggle-track .theme-toggle-thumb {
            left: 22px;
        }
        .theme-toggle:active .theme-toggle-thumb {
            box-shadow: 1px 1px 0 var(--border);
            transform: translate(1px, 1px);
        }

        /* ── Menu button + pop-down drawer ── */
        #menu-wrapper {
            position: relative;
            display: inline-flex;
        }
        #menu-hamburger {
            height: 36px;
            padding: 0 14px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-raised);
            color: var(--fg);
            border: 1px solid var(--border);
            cursor: pointer;
            font-family: inherit;
            transition: background 0.14s ease;
        }
        #menu-hamburger:hover { background: var(--bg-hover); }
        #menu-hamburger .menu-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }
        #menu-hamburger .menu-bars { display: none; }

        #menu-dropdown {
            display: grid;
            grid-template-rows: 0fr;
            background: var(--bg-panel);
            transition: grid-template-rows 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        #menu-dropdown .menu-dropdown-inner {
            overflow: hidden;
            min-height: 0;
        }
        #menu-dropdown.open { grid-template-rows: 1fr; }

        @media (pointer: coarse) {
            #menu-hamburger { width: 36px; padding: 0; }
            #menu-hamburger .menu-label { display: none; }
            #menu-hamburger .menu-bars {
                display: inline-flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
            }
            #menu-hamburger .menu-bars span {
                display: block;
                width: 18px;
                height: 2px;
                background: var(--fg);
            }
            #menu-dropdown .main-nav-tab {
                padding: 16px 24px;
                font-size: 13px;
            }
        }

        .main-nav-tab {
            display: block;
            padding: 10px 20px;
            background: transparent;
            color: var(--fg-muted);
            border: none;
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            text-decoration: none;
            transition: background 0.14s ease, color 0.14s ease;
        }
        .main-nav-tab:hover {
            background: var(--bg-hover);
            color: var(--fg);
        }
        .main-nav-tab.active {
            background: var(--bg-inset);
            color: var(--fg);
            font-weight: 700;
            cursor: default;
            pointer-events: none;
        }

        /* ── Module (placeholder body) ── */
        .module {
            position: relative;
            background: var(--bg-panel);
            border: 2px solid var(--border-dark);
            padding: 36px 22px 26px;
            margin: 24px 0;
        }
        .module::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 10px 10px, var(--border-dark) 2.5px, transparent 3px),
                radial-gradient(circle at calc(100% - 10px) 10px, var(--border-dark) 2.5px, transparent 3px),
                radial-gradient(circle at 10px calc(100% - 10px), var(--border-dark) 2.5px, transparent 3px),
                radial-gradient(circle at calc(100% - 10px) calc(100% - 10px), var(--border-dark) 2.5px, transparent 3px);
        }
        .module-code {
            position: absolute;
            top: -14px;
            left: 20px;
            background: var(--bg-label);
            padding: 6px 10px;
            font-family: 'Roboto Mono', 'Courier New', monospace;
            font-size: 14.4px;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: var(--fg-muted);
            text-transform: uppercase;
        }
        .placeholder-body {
            padding: 40px 12px 28px;
            text-align: center;
        }
        .placeholder-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--fg);
            margin-bottom: 14px;
        }
        .placeholder-sub {
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--fg-muted);
            margin-bottom: 24px;
        }
        .placeholder-copy {
            max-width: 52ch;
            margin: 0 auto;
            font-size: 13px;
            line-height: 1.6;
            color: var(--fg-dim);
        }
    </style>
</head>
<body>
<div id="app">

    <div id="header-right">
        <div id="theme-controls">
            <label class="theme-toggle" title="Toggle dark mode">
                <input type="checkbox" id="btn-theme" />
                <span class="theme-toggle-track">
                    <span class="theme-toggle-label light">LIGHT</span>
                    <span class="theme-toggle-label dark">DARK</span>
                    <span class="theme-toggle-icon moon" aria-hidden="true">
                        <svg viewBox="0 0 12 12">
                            <mask id="toggle-moon-mask">
                                <rect width="12" height="12" fill="white"/>
                                <circle cx="8.5" cy="4" r="4" fill="black"/>
                            </mask>
                            <circle cx="6" cy="6" r="4.5" fill="currentColor" mask="url(#toggle-moon-mask)"/>
                        </svg>
                    </span>
                    <span class="theme-toggle-icon sun" aria-hidden="true">

                            <circle cx="6" cy="6" r="2.2"/>

                            <rect x="5.25" y="10"   width="1.5" height="2"/>
                            <rect x="0"    y="5.25" width="2"   height="1.5"/>
                            <rect x="10"   y="5.25" width="2"   height="1.5"/>
                            <g transform="rotate(45 6 6)">
                                <rect x="5.25" y="0.5" width="1.5" height="1.8"/>
                                <rect x="5.25" y="9.7" width="1.5" height="1.8"/>
                                <rect x="0.5"  y="5.25" width="1.8" height="1.5"/>

                    <span class="menu-label">Menu</span>

                </button>
            </div>
        </div>

</div>

<!-- ── Main Nav Drawer ─────────────────────────────────────────────────────── -->
<div id="menu-dropdown" role="menu">
    <div class="menu-dropdown-inner">
        <a class="main-nav-tab" href="index.html" role="menuitem">Data Manager</a>
        <a class="main-nav-tab" href="manual.html" role="menuitem">Owners Manual</a>
        <a class="main-nav-tab active" href="contact.html" aria-current="page" role="menuitem">Contact</a>
    </div>
</div>

<!-- ── Placeholder body ────────────────────────────────────────────────────── -->
<div class="module">
    <div class="module-code">Contact</div>
    <div class="placeholder-body">
        <div class="placeholder-title">Contact</div>
        <div class="placeholder-sub">Coming soon</div>
        <div class="placeholder-copy">
            Support, feedback, and purchase inquiries. This page is under construction.
        </div>
    </div>
</div>

</div>

<script>
(function() {
    const btn = document.getElementById('btn-theme');
    if (!btn) return;
    const saved = localStorage.getItem('cycles-theme');
    if (saved === 'dark') { document.body.classList.add('dark'); btn.checked = true; }
    btn.addEventListener('change', () => {
        const dark = btn.checked;
        document.body.classList.toggle('dark', dark);
        localStorage.setItem('cycles-theme', dark ? 'dark' : 'light');
    });
})();

(function() {
    const btn = document.getElementById('menu-hamburger');
    const dropdown = document.getElementById('menu-dropdown');
    const wrapper = document.getElementById('menu-wrapper');
    if (!btn || !dropdown || !wrapper) return;

    const close = () => {
        dropdown.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
    };
    const open = () => {
        dropdown.classList.add('open');
        btn.setAttribute('aria-expanded', 'true');
    };
    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.contains('open') ? close() : open();
    });
    document.addEventListener('click', (e) => {
        if (!wrapper.contains(e.target) && !dropdown.contains(e.target)) close();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') close();
    });
})();
</script>
</body>
